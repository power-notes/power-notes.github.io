<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <clipPath id="left-clip"><polygon points="0,0 430,0 370,400 0,400"/></clipPath>
    <clipPath id="right-clip"><polygon points="430,0 800,0 800,400 370,400"/></clipPath>
    <pattern id="hex-pat" x="0" y="0" width="52" height="60" patternUnits="userSpaceOnUse">
      <polygon points="26,2 50,15 50,45 26,58 2,45 2,15" fill="none" stroke="#1A8FE8" stroke-width="0.8" opacity="0.35"/>
    </pattern>
    <pattern id="grid-pat" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <line x1="32" y1="0" x2="32" y2="32" stroke="#9B4F9B" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="32" x2="32" y2="32" stroke="#9B4F9B" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Left side background - Power Platform -->
  <rect width="800" height="400" fill="#001E3C"/>
  <rect clip-path="url(#left-clip)" width="800" height="400" fill="#002D5C"/>
  <rect clip-path="url(#right-clip)" width="800" height="400" fill="#1A0A2E"/>

  <!-- Left hex pattern -->
  <rect clip-path="url(#left-clip)" width="800" height="400" fill="url(#hex-pat)"/>
  <!-- Right grid pattern -->
  <rect clip-path="url(#right-clip)" width="800" height="400" fill="url(#grid-pat)"/>

  <!-- Diagonal divider -->
  <polygon points="415,0 445,0 385,400 355,400" fill="#0078D4" opacity="0.18"/>
  <line x1="430" y1="0" x2="370" y2="400" stroke="#0078D4" stroke-width="1.5" opacity="0.6"/>

  <!-- Left side: Hexagon cluster nodes (Power Platform modular) -->
  <g opacity="0.9">
    <polygon points="100,120 124,107 148,120 148,146 124,159 100,146" fill="#0078D4" opacity="0.22"/>
    <polygon points="100,120 124,107 148,120 148,146 124,159 100,146" fill="none" stroke="#50B0F0" stroke-width="1.2"/>
    <circle cx="124" cy="133" r="4" fill="#50B0F0"/>

    <polygon points="148,80 172,67 196,80 196,106 172,119 148,106" fill="#0066CC" opacity="0.22"/>
    <polygon points="148,80 172,67 196,80 196,106 172,119 148,106" fill="none" stroke="#3A9FE0" stroke-width="1.2"/>
    <circle cx="172" cy="93" r="4" fill="#3A9FE0"/>

    <polygon points="196,120 220,107 244,120 244,146 220,159 196,146" fill="#0099BC" opacity="0.22"/>
    <polygon points="196,120 220,107 244,120 244,146 220,159 196,146" fill="none" stroke="#00BFDF" stroke-width="1.2"/>
    <circle cx="220" cy="133" r="4" fill="#00BFDF"/>

    <polygon points="100,200 124,187 148,200 148,226 124,239 100,226" fill="#0078D4" opacity="0.15"/>
    <polygon points="100,200 124,187 148,200 148,226 124,239 100,226" fill="none" stroke="#50B0F0" stroke-width="0.8" opacity="0.5"/>

    <polygon points="196,200 220,187 244,200 244,226 220,239 196,226" fill="#0066CC" opacity="0.15"/>
    <polygon points="196,200 220,187 244,200 244,226 220,239 196,226" fill="none" stroke="#3A9FE0" stroke-width="0.8" opacity="0.5"/>

    <polygon points="148,240 172,227 196,240 196,266 172,279 148,266" fill="#0099BC" opacity="0.15"/>
    <polygon points="148,240 172,227 196,240 196,266 172,279 148,266" fill="none" stroke="#00BFDF" stroke-width="0.8" opacity="0.5"/>

    <!-- Connection lines between hexes -->
    <line x1="148" y1="133" x2="172" y2="93" stroke="#0078D4" stroke-width="1" opacity="0.5"/>
    <line x1="196" y1="93" x2="220" y2="133" stroke="#0078D4" stroke-width="1" opacity="0.5"/>
    <line x1="148" y1="133" x2="196" y2="133" stroke="#0078D4" stroke-width="1" opacity="0.5"/>
    <line x1="148" y1="213" x2="124" y2="239" stroke="#0078D4" stroke-width="0.8" opacity="0.3"/>
    <line x1="196" y1="133" x2="196" y2="200" stroke="#0078D4" stroke-width="0.8" opacity="0.3"/>

    <!-- Large central hex (Power Platform logo-like) -->
    <polygon points="52,290 96,265 140,290 140,340 96,365 52,340" fill="#0078D4" opacity="0.3"/>
    <polygon points="52,290 96,265 140,290 140,340 96,365 52,340" fill="none" stroke="#50B0F0" stroke-width="1.5"/>
    <circle cx="96" cy="315" r="12" fill="#0078D4" opacity="0.5"/>
    <circle cx="96" cy="315" r="6" fill="#50B0F0"/>
  </g>

  <!-- Right side: Code / Custom Dev elements -->
  <g opacity="0.9">
    <!-- Code bracket large -->
    <path d="M520,130 L498,160 L520,190" fill="none" stroke="#C87CC8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M690,130 L712,160 L690,190" fill="none" stroke="#C87CC8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Code lines -->
    <rect x="535" y="150" width="80" height="4" rx="2" fill="#742774" opacity="0.7"/>
    <rect x="535" y="162" width="120" height="4" rx="2" fill="#9B4F9B" opacity="0.5"/>
    <rect x="548" y="174" width="60" height="4" rx="2" fill="#742774" opacity="0.4"/>
    <rect x="548" y="186" width="90" height="4" rx="2" fill="#9B4F9B" opacity="0.5"/>

    <!-- Stacked architecture layers -->
    <rect x="500" y="230" width="220" height="28" rx="4" fill="#0055A5" opacity="0.4"/>
    <rect x="500" y="230" width="220" height="28" rx="4" fill="none" stroke="#3A8FD4" stroke-width="0.8"/>

    <rect x="510" y="266" width="200" height="28" rx="4" fill="#003F80" opacity="0.4"/>
    <rect x="510" y="266" width="200" height="28" rx="4" fill="none" stroke="#2A7FC4" stroke-width="0.8"/>

    <rect x="520" y="302" width="180" height="28" rx="4" fill="#002960" opacity="0.4"/>
    <rect x="520" y="302" width="180" height="28" rx="4" fill="none" stroke="#1A6FB4" stroke-width="0.8"/>

    <rect x="530" y="338" width="160" height="28" rx="4" fill="#001940" opacity="0.4"/>
    <rect x="530" y="338" width="160" height="28" rx="4" fill="none" stroke="#0A5FA4" stroke-width="0.8"/>

    <!-- Layer dots -->
    <circle cx="520" cy="244" r="3" fill="#50A0E0" opacity="0.8"/>
    <circle cx="522" cy="280" r="3" fill="#3A90D0" opacity="0.7"/>
    <circle cx="524" cy="316" r="3" fill="#2A80C0" opacity="0.6"/>
    <circle cx="526" cy="352" r="3" fill="#1A70B0" opacity="0.5"/>
  </g>

  <!-- Center "VS" marker -->
  <circle cx="400" cy="200" r="22" fill="#001E3C" stroke="#0078D4" stroke-width="1.5"/>
  <text x="400" y="206" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" font-weight="700" fill="#50B0F0">VS</text>

  <!-- Left label -->
  <text x="60" y="48" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="600" fill="#50B0F0" letter-spacing="3" opacity="0.7">POWER PLATFORM</text>

  <!-- Right label -->
  <text x="740" y="48" text-anchor="end" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="600" fill="#C87CC8" letter-spacing="3" opacity="0.7">CUSTOM DEV</text>

  <!-- Ambient dots -->
  <circle cx="310" cy="60" r="2" fill="#0078D4" opacity="0.4"/>
  <circle cx="280" cy="350" r="1.5" fill="#0078D4" opacity="0.3"/>
  <circle cx="340" cy="330" r="2.5" fill="#0066CC" opacity="0.25"/>
  <circle cx="460" cy="80" r="2" fill="#742774" opacity="0.4"/>
  <circle cx="490" cy="360" r="1.5" fill="#9B4F9B" opacity="0.3"/>
</svg>
