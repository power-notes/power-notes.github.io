<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <pattern id="circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0,30 L15,30 M45,30 L60,30 M30,0 L30,15 M30,45 L30,60" stroke="#0044A0" stroke-width="0.4" opacity="0.25" fill="none"/>
      <circle cx="30" cy="30" r="2" fill="#0044A0" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#000F28"/>
  <rect width="800" height="400" fill="url(#circuit)"/>

  <!-- Center target / execution point -->
  <circle cx="580" cy="200" r="36" fill="#002255" opacity="0.8"/>
  <circle cx="580" cy="200" r="36" fill="none" stroke="#0078D4" stroke-width="2"/>
  <circle cx="580" cy="200" r="24" fill="none" stroke="#0078D4" stroke-width="0.8" opacity="0.5"/>
  <circle cx="580" cy="200" r="8" fill="#0078D4" opacity="0.6"/>
  <circle cx="580" cy="200" r="4" fill="#50B0F0"/>

  <!-- Output arrow -->
  <line x1="616" y1="200" x2="720" y2="200" stroke="#50B0F0" stroke-width="2" stroke-linecap="round"/>
  <polygon points="718,194 732,200 718,206" fill="#50B0F0"/>
  <rect x="720" y="186" width="56" height="28" rx="5" fill="#002255" opacity="0.8"/>
  <rect x="720" y="186" width="56" height="28" rx="5" fill="none" stroke="#0078D4" stroke-width="0.8"/>
  <text x="748" y="203" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="600" fill="#50B0F0" letter-spacing="1">EXECUTE</text>

  <!-- PATH 1: Plugin (top) - sharp code blue -->
  <path d="M80,70 C180,70 280,70 380,100 C450,120 510,150 544,175" fill="none" stroke="#0099E8" stroke-width="2" stroke-linecap="round"/>
  <!-- Plugin start card -->
  <rect x="40" y="40" width="160" height="72" rx="8" fill="#001F45" opacity="0.9"/>
  <rect x="40" y="40" width="160" height="72" rx="8" fill="none" stroke="#0099E8" stroke-width="1.2"/>
  <!-- Plugin icon: curly braces -->
  <path d="M68,68 L62,76 L68,84" fill="none" stroke="#0099E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M90,68 L96,76 L90,84" fill="none" stroke="#0099E8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="116" y="73" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="700" fill="#0099E8">Plugin</text>
  <text x="116" y="87" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#3A80C0" opacity="0.8">Synchronous · C#</text>
  <!-- Feature dots -->
  <circle cx="56" cy="100" r="2" fill="#0099E8" opacity="0.5"/>
  <rect x="64" y="98" width="50" height="3" rx="1.5" fill="#0099E8" opacity="0.3"/>
  <circle cx="56" cy="108" r="2" fill="#0099E8" opacity="0.4"/>
  <rect x="64" y="106" width="70" height="3" rx="1.5" fill="#0099E8" opacity="0.25"/>
  <!-- Waypoint -->
  <circle cx="380" cy="100" r="5" fill="#000F28" stroke="#0099E8" stroke-width="1.2"/>

  <!-- PATH 2: Power Automate (middle) - teal flow -->
  <path d="M80,200 C200,200 350,200 544,200" fill="none" stroke="#00B8D0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Automate start card -->
  <rect x="40" y="166" width="160" height="72" rx="8" fill="#001E30" opacity="0.9"/>
  <rect x="40" y="166" width="160" height="72" rx="8" fill="none" stroke="#00B8D0" stroke-width="1.2"/>
  <!-- Automate icon: flow arrow loop -->
  <path d="M62,194 L62,214 L82,214" fill="none" stroke="#00B8D0" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M72,206 L82,214 L72,222" fill="none" stroke="#00B8D0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="198" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="700" fill="#00B8D0">Automate</text>
  <text x="100" y="212" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#0088A0" opacity="0.8">Async · Low-code</text>
  <circle cx="56" cy="226" r="2" fill="#00B8D0" opacity="0.5"/>
  <rect x="64" y="224" width="55" height="3" rx="1.5" fill="#00B8D0" opacity="0.3"/>
  <circle cx="56" cy="234" r="2" fill="#00B8D0" opacity="0.4"/>
  <rect x="64" y="232" width="78" height="3" rx="1.5" fill="#00B8D0" opacity="0.25"/>
  <!-- Waypoint -->
  <circle cx="300" cy="200" r="5" fill="#000F28" stroke="#00B8D0" stroke-width="1.2"/>
  <circle cx="450" cy="200" r="5" fill="#000F28" stroke="#00B8D0" stroke-width="1.2"/>

  <!-- PATH 3: Azure Function (bottom) - deep azure blue -->
  <path d="M80,330 C180,330 280,320 380,295 C450,278 510,248 544,224" fill="none" stroke="#3A88E8" stroke-width="2" stroke-linecap="round"/>
  <!-- Azure Function start card -->
  <rect x="40" y="296" width="160" height="72" rx="8" fill="#001540" opacity="0.9"/>
  <rect x="40" y="296" width="160" height="72" rx="8" fill="none" stroke="#3A88E8" stroke-width="1.2"/>
  <!-- Function icon: lightning bolt -->
  <path d="M74,314 L64,332 L72,332 L66,350 L80,328 L72,328 Z" fill="#3A88E8" opacity="0.8"/>
  <text x="100" y="326" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" font-weight="700" fill="#3A88E8">Az Function</text>
  <text x="100" y="340" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#2060C0" opacity="0.8">Async · Scale out</text>
  <circle cx="56" cy="354" r="2" fill="#3A88E8" opacity="0.5"/>
  <rect x="64" y="352" width="62" height="3" rx="1.5" fill="#3A88E8" opacity="0.3"/>
  <circle cx="56" cy="362" r="2" fill="#3A88E8" opacity="0.4"/>
  <rect x="64" y="360" width="44" height="3" rx="1.5" fill="#3A88E8" opacity="0.25"/>
  <!-- Waypoint -->
  <circle cx="380" cy="295" r="5" fill="#000F28" stroke="#3A88E8" stroke-width="1.2"/>

  <!-- Decision label -->
  <text x="400" y="28" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" font-weight="600" fill="#0088CC" letter-spacing="2.5" opacity="0.6" text-anchor="middle">EXTENSIBILITY DECISION</text>

  <!-- Ambient glow rings around target -->
  <circle cx="580" cy="200" r="52" fill="none" stroke="#0078D4" stroke-width="0.5" opacity="0.2"/>
  <circle cx="580" cy="200" r="70" fill="none" stroke="#0078D4" stroke-width="0.5" opacity="0.1"/>

  <!-- Small ambient dots -->
  <circle cx="250" cy="50" r="1.5" fill="#0099E8" opacity="0.3"/>
  <circle cx="320" cy="360" r="1.5" fill="#3A88E8" opacity="0.3"/>
  <circle cx="480" cy="40" r="1" fill="#00B8D0" opacity="0.25"/>
  <circle cx="660" cy="340" r="1.5" fill="#0078D4" opacity="0.2"/>
</svg>
